name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build MyParser plugin and all providers
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore MyParser.sln

      - name: Build solution
        run: dotnet build MyParser.sln --configuration Release --no-restore -p:CopyPluginToHost=false -p:BuildMyParserProvidersOnMainPluginBuild=false -v:minimal

      - name: Collect plugin layout
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $packageRoot = Join-Path $PWD "artifact/Shirobot.Plugin.MyParser"
          $providerRoot = Join-Path $packageRoot "provider"
          New-Item -ItemType Directory -Force -Path $providerRoot | Out-Null

          $mainOut = Join-Path $PWD "MyParser/bin/Release/net10.0"
          $providers = @{
            "bilibili" = Join-Path $PWD "MyParser.Provider.BiliBili/bin/Release/net10.0"
            "douyin" = Join-Path $PWD "MyParser.Provider.Douyin/bin/Release/net10.0"
            "xiaohongshu" = Join-Path $PWD "MyParser.Provider.Xiaohongshu/bin/Release/net10.0"
            "heybox" = Join-Path $PWD "MyParser.Provider.Heybox/bin/Release/net10.0"
            "neteasecloudmusic" = Join-Path $PWD "MyParser.Provider.NetEaseCloudMusic/bin/Release/net10.0"
            "weixinchannels" = Join-Path $PWD "MyParser.Provider.WeixinChannels/bin/Release/net10.0"
          }

          $mainFiles = @(
            "Shirobot.Plugin.MyParser.dll",
            "myparser-sharing.dll",
            "QrCodeGenerator.dll",
            "SilkSharp.dll"
          )
          foreach ($file in $mainFiles) {
            $source = Join-Path $mainOut $file
            if (-not (Test-Path $source)) { throw "Missing plugin output: $source" }
            Copy-Item $source $packageRoot -Force
          }

          foreach ($name in $providers.Keys) {
            $out = $providers[$name]
            $providerDll = Join-Path $out "myparser-provider-$name.dll"
            if (-not (Test-Path $providerDll)) { throw "Missing provider output: $providerDll" }
            Copy-Item $providerDll $providerRoot -Force
          }

          $silkCodec = Join-Path $mainOut "runtimes/win-x64/native/silkcodec.dll"
          if (-not (Test-Path $silkCodec)) { throw "Missing silkcodec native dependency: $silkCodec" }
          Copy-Item $silkCodec $packageRoot -Force

          $required = @(
            (Join-Path $packageRoot "Shirobot.Plugin.MyParser.dll"),
            (Join-Path $packageRoot "myparser-sharing.dll"),
            (Join-Path $packageRoot "QrCodeGenerator.dll"),
            (Join-Path $packageRoot "SilkSharp.dll"),
            (Join-Path $packageRoot "silkcodec.dll"),
            (Join-Path $providerRoot "myparser-provider-bilibili.dll"),
            (Join-Path $providerRoot "myparser-provider-douyin.dll"),
            (Join-Path $providerRoot "myparser-provider-xiaohongshu.dll"),
            (Join-Path $providerRoot "myparser-provider-heybox.dll"),
            (Join-Path $providerRoot "myparser-provider-neteasecloudmusic.dll"),
            (Join-Path $providerRoot "myparser-provider-weixinchannels.dll")
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) { throw "Missing expected package file: $path" }
          }

          Get-ChildItem $packageRoot -Recurse -File | Select-Object FullName, Length

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Shirobot.Plugin.MyParser
          if-no-files-found: error
          path: artifact/Shirobot.Plugin.MyParser/**
